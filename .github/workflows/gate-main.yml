name: Gate main

on:
  pull_request:
    branches: [main]

jobs:
  require-staging-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "::error::PRs to main must come from staging. Got: ${{ github.head_ref }}"
            exit 1
          fi
