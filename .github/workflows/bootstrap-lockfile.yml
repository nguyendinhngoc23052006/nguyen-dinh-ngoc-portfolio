# One-shot workflow: generates package-lock.json, then deletes itself.
# Triggers when package.json is first pushed to the setup branch, or manually.
name: Bootstrap package-lock.json
on:
  push:
    branches:
      - 'claude/astro-portfolio-setup-r2cqoy'
    paths:
      - 'package.json'
  workflow_dispatch:
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/astro-portfolio-setup-r2cqoy
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Generate lockfile
        run: npm install --package-lock-only
      - name: Commit lockfile and remove this workflow
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]" 
          rm .github/workflows/bootstrap-lockfile.yml
          git add package-lock.json
          git add -u .github/workflows/bootstrap-lockfile.yml
          git diff --cached --quiet || git commit -m "chore: generate package-lock.json [skip ci]"
          git push
